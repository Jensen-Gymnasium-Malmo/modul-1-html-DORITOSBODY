<!--   
Uppgift 2: Tabeller

Gör uppgifter på: https://www.w3schools.com/html/exercise.asp?x=xrcise_tables1

Skapa en tabell med 3 kolumner och 4 rader.
I tabellen ska det stå:
    - Första raden: "Namn", "Ålder", "Stad"
    - Rad 2,3,4 ska innehålla valfria namn, åldrar och städer.

-->

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title></title>
</head>
<body>
<table border="1">
     <tr>
        <th align="center">Namn</th>
        <th align="center">Ålder</th>
        <th align="center">Stad</th>
     </tr>
     <tr>
         <td>Bengt</td>
         <td>62</td>
        <td>göteborg</td>
     </tr>
     <tr>
         <td>Kumail</td>
         <td>17</td>
         <td>malmö</td>
     </tr>
     <tr>
         <td>Khimal</td>
         <td>12</td>
         <td>stockholm</td>
    </tr>
</table>
</body>
</html>
