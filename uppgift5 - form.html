<!--
Uppgift 5 - Formulär

På sidan ska det finnas:
    - Ett formulär som innehåller minst följande:
        - Två textfält
        - En radio-input
        - En checkbox-input
        - En submit-knapp som submittar formuläret och skickar användaren till en tack.html
        - En select+option input
        - Tydliga labels för varje input 
        - Minst 2 delar av formuläret med fieldset
        - En input som redan har data i sig (value-attributet)

Skapa nu en ny html-fil som heter “tack.html”  som bara har en <h1> tagg som säger “TACK för att du fyllt i mitt formulär” 
Samt en knapp som öppnar “form.html” igen (titta på förra lektionen med <a> elementet, samt se slide 7)
Se till att när man klickar på submit-knappen i formuläret så ska tack.html visas i webbläsaren istället.

-->

<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Formulär</title>
</head>

<body>

    <h1>Fyll i formuläret</h1>

    <form action="tack.html">

        <!-- Fieldset 1 -->
        <fieldset>
            <legend>Personlig information</legend>

            <label for="namn">Namn:</label><br>
            <input type="text" id="namn" name="namn" value="Mattias"><br><br>

            <label for="email">Email:</label><br>
            <input type="text" id="email" name="email"><br><br>
        </fieldset>

        <br>

        <!-- Fieldset 2 -->
        <fieldset>
            <legend>Val</legend>

            <p>Kön:</p>
            <input type="radio" id="man" name="kon">
            <label for="man">Man</label><br>

            <input type="radio" id="kvinna" name="kon">
            <label for="kvinna">Kvinna</label><br><br>

            <input type="checkbox" id="nyhetsbrev">
            <label for="nyhetsbrev">Prenumerera på nyhetsbrev</label><br><br>

            <label for="stad">Välj stad:</label><br>
            <select id="stad">
                <option>Stockholm</option>
                <option>Göteborg</option>
                <option>Malmö</option>
            </select>
        </fieldset>

        <br>

        <input type="submit" value="Skicka">

    </form>

</body>

</html>
